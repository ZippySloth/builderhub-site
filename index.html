<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1c" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Primary SEO -->
    <title>BuilderHub — Managed Data Intelligence for Growth Companies</title>
    <meta name="description" content="BuilderHub builds the data pipelines, transformation models, and dashboards that turn your scattered data into one source of truth. Managed analytics for post-acquisition SMBs, Series B SaaS, and growth companies. Book a data audit from $750." />
    <meta name="keywords" content="managed analytics service, data pipeline consultant, fractional data team, SaaS metrics dashboard, outsourced analytics, data stack for startups, automate business reporting, analytics engineer, data infrastructure" />
    <meta name="author" content="BuilderHub" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://buildrhub.io" />

    <!-- Open Graph (LinkedIn / Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buildrhub.io" />
    <meta property="og:title" content="BuilderHub — Managed Data Intelligence for Growth Companies" />
    <meta property="og:description" content="You own your raw data. We run the intelligence on top of it. Pipelines, transformation models, and dashboards that turn scattered data into decisions. Book a $750 data audit." />
    <meta property="og:image" content="https://buildrhub.io/og-image.png" />
    <meta property="og:site_name" content="BuilderHub" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BuilderHub — Managed Data Intelligence" />
    <meta name="twitter:description" content="You own your raw data. We run the intelligence on top of it." />
    <meta name="twitter:image" content="https://buildrhub.io/og-image.png" />

    <!-- Structured Data: Organization / ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "BuilderHub",
      "description": "Managed data intelligence service. We build and run the data layer for growth companies — pipelines, transformation models, and dashboards.",
      "url": "https://buildrhub.io",
      "email": "contact@buildrhub.io",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Montreal",
        "addressRegion": "QC",
        "addressCountry": "CA"
      },
      "areaServed": ["US", "CA"],
      "serviceType": ["Data Pipeline Engineering", "Analytics Engineering", "Managed Analytics", "Business Intelligence"],
      "priceRange": "$750 - $15000"
    }
    </script>

    <!-- Structured Data: Services -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "BuilderHub Services",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "Service",
            "name": "Data Audit",
            "description": "3-5 day assessment of your current data stack. Full gap analysis and prioritized build roadmap.",
            "offers": { "@type": "Offer", "price": "750", "priceCurrency": "USD" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "Service",
            "name": "Foundation Build",
            "description": "Full data stack build: pipelines, transformation models, dashboards. 3-6 weeks.",
            "offers": { "@type": "Offer", "price": "5000", "priceCurrency": "USD" }
          }
        },
        {
          "@type": "ListItem",
          "position": 3,
          "item": {
            "@type": "Service",
            "name": "Managed Retainer",
            "description": "Ongoing hosting, maintenance, and evolution of your data stack.",
            "offers": { "@type": "Offer", "price": "1500", "priceCurrency": "USD" }
          }
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How is BuilderHub different from hiring a data analyst?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most analysts can build dashboards but don't understand business context. Most business people know what metrics matter but can't build systems. BuilderHub does both — and maintains everything ongoing as a managed service, not a one-time project."
          }
        },
        {
          "@type": "Question",
          "name": "What if we don't have a data warehouse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No problem. BuilderHub sets up the full infrastructure — you don't need any existing data warehouse. Your SaaS tools connect directly and data flows into BuilderHub's managed stack."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if we cancel the retainer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You keep your raw data. But the transformation models and dashboards stop running. Rebuilding from scratch typically takes 3-6 months and a $120-180k engineering hire."
          }
        },
        {
          "@type": "Question",
          "name": "How long until we see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The audit delivers a full roadmap in 3-5 days. The foundation build delivers working, auto-updating dashboards in 3-6 weeks."
          }
        }
      ]
    }
    </script>

    <link rel="icon" href="/src/assets/buildrhub-favicon-black.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
